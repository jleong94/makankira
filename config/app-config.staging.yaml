# =====================================================================
# STAGING profile (committed). Same shape as local; only non-secret
# literals differ. apiBaseUrl is the same-origin relative path so Vercel
# preview URLs keep working. Secrets come from GitHub Actions env in CI.
# =====================================================================

frontend:                                  # PUBLIC values compiled into the web app
  apiBaseUrl: "/api"                       # same-origin on Vercel preview deployments
  googleOAuthClientId: ${GOOGLE_OAUTH_CLIENT_ID}
  facebookAppId: ${FACEBOOK_APP_ID}
  vapidPublicKey: ${VAPID_PUBLIC_KEY}

backend:                                   # SECRET values, server-side only
  tursoDatabaseUrl: ${TURSO_DATABASE_URL}
  tursoAuthToken: ${TURSO_AUTH_TOKEN}
  googleOAuthClientSecret: ${GOOGLE_OAUTH_CLIENT_SECRET}
  facebookAppSecret: ${FACEBOOK_APP_SECRET}
  sessionSecret: ${SESSION_SECRET}
  fileStorageToken: ${BLOB_READ_WRITE_TOKEN}
  resendApiKey: ${RESEND_API_KEY}
  vapidPublicKey: ${VAPID_PUBLIC_KEY}
  vapidPrivateKey: ${VAPID_PRIVATE_KEY}
  vapidSubject: "mailto:reminders@makankira.app"
  cronSecret: ${CRON_SECRET}
